<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-layout}">
<head>
    <title>Admin Dashboard</title>
    <th:block layout:fragment="extra-css">
        <style>
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 16px;
                margin-bottom: 24px;
            }

            .stat-card {
                border: 1px solid #ececec;
                border-radius: 10px;
                padding: 18px;
                background: #fff;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            }

            .stat-label {
                font-size: 14px;
                color: #666;
                margin-bottom: 8px;
            }

            .stat-value {
                font-size: 28px;
                font-weight: 700;
                color: #222;
            }

            .tools {
                border: 1px solid #ececec;
                border-radius: 10px;
                padding: 18px;
                background: #fff;
            }

            .btn-primary {
                display: inline-block;
                background: #f9c74f;
                color: #111;
                text-decoration: none;
                border-radius: 6px;
                padding: 10px 14px;
                font-weight: 600;
            }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div style="margin-bottom: 20px;">
        <h1 style="margin: 0; font-size: 24px;">Tổng quan người dùng</h1>
        <p style="margin: 6px 0 0; color: #666;">Dashboard admin chỉ phục vụ quản lý tài khoản người dùng.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Tổng số tài khoản quản lý</div>
            <div class="stat-value" id="totalUsers">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Tài khoản đang hoạt động</div>
            <div class="stat-value" id="activeUsers">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Tài khoản đang tạm khóa</div>
            <div class="stat-value" id="inactiveUsers">-</div>
        </div>
    </div>

    <div class="tools">
        <h3 style="margin-top: 0;">Thao tác nhanh</h3>
        <p style="color: #666;">Xem danh sách, tạo mới, kích hoạt/vô hiệu hóa tài khoản người dùng.</p>
        <a class="btn-primary" th:href="@{/admin/users}">Mở quản lý người dùng</a>
    </div>
</div>

<th:block layout:fragment="extra-js">
    <script>
        (function () {
            function fmt(n) {
                return n == null ? '0' : Number(n).toLocaleString('vi-VN');
            }

            fetch('/api/dashboard/stats', { credentials: 'include' })
                .then(function (res) { return res.json(); })
                .then(function (stats) {
                    document.getElementById('totalUsers').textContent = fmt(stats.totalUsers);
                    document.getElementById('activeUsers').textContent = fmt(stats.activeUsers);
                    document.getElementById('inactiveUsers').textContent = fmt(stats.inactiveUsers);
                })
                .catch(function () {
                    document.getElementById('totalUsers').textContent = 'N/A';
                    document.getElementById('activeUsers').textContent = 'N/A';
                    document.getElementById('inactiveUsers').textContent = 'N/A';
                });
        })();
    </script>
</th:block>
</body>
</html>
