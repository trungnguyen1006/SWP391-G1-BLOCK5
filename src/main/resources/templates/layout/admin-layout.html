<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link th:href="@{/simple-datatables/style.css}" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background-color: #e8e8e8;
            border-right: 1px solid #ddd;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #ddd;
            background-color: #e8e8e8;
        }

        .sidebar-header h2 {
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            border-bottom: 1px solid #ddd;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: #555;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .nav-link:hover {
            background-color: #d8d8d8;
            color: #333;
        }

        .nav-item.active .nav-link {
            background-color: #fff;
            color: #333;
            font-weight: 500;
        }

        .nav-link i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
            color: #666;
        }

        .nav-item.active .nav-link i {
            color: #333;
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
            background-color: #fff;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .sidebar-header h2 {
                font-size: 16px;
            }

            .nav-link {
                padding: 12px 15px;
                font-size: 13px;
            }
        }
    </style>
    <th:block layout:fragment="extra-css"></th:block>
</head>
<body>
<div class="dashboard-container">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>Admin Dashboard</h2>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="/admin" class="nav-link" id="nav-dashboard">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/room-types" class="nav-link" id="nav-room-types">
                    <i class="fas fa-layer-group"></i>
                    <span>Room Types</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/rooms" class="nav-link" id="nav-rooms">
                    <i class="fas fa-door-open"></i>
                    <span>Rooms</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/amenities" class="nav-link" id="nav-amenities">
                    <i class="fas fa-concierge-bell"></i>
                    <span>Amenities</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/users" class="nav-link" id="nav-users">
                    <i class="fas fa-users"></i>
                    <span>Manage User account</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/receptionists" class="nav-link" id="nav-receptionists">
                    <i class="fas fa-user-tie"></i>
                    <span>Receptionists</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/promotions" class="nav-link" id="nav-promotions">
                    <i class="fas fa-tags"></i>
                    <span>Promotions</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/restaurants" class="nav-link" id="nav-restaurants">
                    <i class="fas fa-utensils"></i>
                    <span>Restaurants</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/restaurant-bookings" class="nav-link" id="nav-restaurant-bookings">
                    <i class="fas fa-calendar-check"></i>
                    <span>Restaurant Bookings</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/feedbacks" class="nav-link" id="nav-feedbacks">
                    <i class="fas fa-comment-dots"></i>
                    <span>Feedbacks</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="/admin/blogs" class="nav-link" id="nav-blogs">
                    <i class="fas fa-newspaper"></i>
                    <span>Blogs</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="#" class="nav-link" onclick="document.getElementById('logoutForm').submit(); return false;">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </li>
        </ul>

        <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;"></form>

    </nav>

    <main class="main-content">
        <div layout:fragment="content">

        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block layout:fragment="extra-js"></th:block>
<script th:src="@{/simple-datatables/simple-datatables.js}"></script>
<script th:src="@{/tinymce/tinymce.min.js}"></script>
<script th:src="@{/js/main.js}"></script>
<!-- Auto highlight active nav item -->
<script>
    (function () {
        var path = window.location.pathname;
        var map = {
            'nav-dashboard':    ['/admin'],
            'nav-room-types':   ['/admin/room-types'],
            'nav-rooms':        ['/admin/rooms'],
            'nav-amenities':    ['/admin/amenities'],
            'nav-promotions':   ['/admin/promotions'],
            'nav-restaurants':         ['/admin/restaurants'],
            'nav-feedbacks':    ['/admin/feedbacks'],
            'nav-blogs':        ['/admin/blogs'],
            'nav-users':        ['/admin/users'],
            'nav-receptionists':['/admin/receptionists']
        };
        Object.entries(map).forEach(function ([id, paths]) {
            var el = document.getElementById(id);
            if (!el) return;
            var matched = paths.some(function (p) {
                return p === '/admin' ? path === '/admin' : path.startsWith(p);
            });
            if (matched) el.classList.add('active');
        });
    })();
</script>
</body>
</html>
