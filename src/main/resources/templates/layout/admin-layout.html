<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link th:href="@{/simple-datatables/style.css}" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: #1e293b;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
            overflow-x: hidden;
            transition: width 0.3s ease;
        }

        .sidebar-brand {
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .sidebar-brand-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff;
            flex-shrink: 0;
        }

        .sidebar-brand-text {
            font-size: 16px;
            font-weight: 700;
            color: #f8fafc;
            line-height: 1.2;
        }

        .sidebar-brand-sub {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 400;
        }

        /* Nav sections */
        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-section-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #475569;
            padding: 12px 8px 6px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .nav-link i {
            font-size: 16px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.07);
            color: #f1f5f9;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 12px rgba(99,102,241,0.35);
        }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        .btn-logout {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 12px;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px;
            color: #f87171;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-logout:hover {
            background: rgba(239,68,68,0.22);
            color: #fca5a5;
        }

        /* ===== MAIN CONTENT ===== */
        .main-wrapper {
            margin-left: 260px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 30px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-badge {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        /* Main content area */
        .main-content {
            flex: 1;
            padding: 28px 30px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .sidebar { width: 220px; }
            .main-wrapper { margin-left: 220px; }
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-wrapper { margin-left: 0; }
            .topbar { padding: 0 16px; }
            .main-content { padding: 16px; }
        }
    </style>
    <th:block layout:fragment="extra-css"></th:block>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
            <i class="fas fa-hotel"></i>
        </div>
        <div>
            <div class="sidebar-brand-text">Hotel Admin</div>
            <div class="sidebar-brand-sub">Management System</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section-label">Tổng quan</div>
        <a href="/admin" class="nav-link" id="nav-dashboard">
            <i class="fas fa-chart-pie"></i>
            <span>Dashboard</span>
        </a>

        <div class="nav-section-label">Quản lý phòng</div>
        <a href="/admin/room-types" class="nav-link" id="nav-room-types">
            <i class="fas fa-layer-group"></i>
            <span>Loại phòng</span>
        </a>
        <a href="/admin/rooms" class="nav-link" id="nav-rooms">
            <i class="fas fa-door-open"></i>
            <span>Phòng</span>
        </a>
        <a href="/admin/amenities" class="nav-link" id="nav-amenities">
            <i class="fas fa-concierge-bell"></i>
            <span>Tiện nghi</span>
        </a>

        <div class="nav-section-label">Kinh doanh</div>
        <a href="/admin/promotions" class="nav-link" id="nav-promotions">
            <i class="fas fa-tags"></i>
            <span>Khuyến mãi</span>
        </a>
        <a href="/admin/restaurants" class="nav-link" id="nav-restaurants">
            <i class="fas fa-utensils"></i>
            <span>Nhà hàng</span>
        </a>
        <a href="/admin/feedbacks" class="nav-link" id="nav-feedbacks">
            <i class="fas fa-comment-dots"></i>
            <span>Phản hồi</span>
        </a>
        <a href="/admin/blogs" class="nav-link" id="nav-blogs">
            <i class="fas fa-newspaper"></i>
            <span>Bài viết</span>
        </a>

        <div class="nav-section-label">Người dùng</div>
        <a href="/admin/users" class="nav-link" id="nav-users">
            <i class="fas fa-users"></i>
            <span>Tài khoản</span>
        </a>
        <a href="/admin/receptionists" class="nav-link" id="nav-receptionists">
            <i class="fas fa-user-tie"></i>
            <span>Lễ tân</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Đăng xuất</span>
            </button>
        </form>
    </div>
</aside>

<!-- Main Wrapper -->
<div class="main-wrapper">
    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-title">Admin Dashboard</div>
        <div class="topbar-right">
            <div class="admin-badge">
                <i class="fas fa-user-shield"></i>
                <span sec:authentication="name">Admin</span>
            </div>
        </div>
    </header>

    <!-- Page Content -->
    <main class="main-content">
        <div layout:fragment="content">
            <!-- Nội dung trang con -->
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block layout:fragment="extra-js"></th:block>
<script th:src="@{/simple-datatables/simple-datatables.js}"></script>
<script th:src="@{/tinymce/tinymce.min.js}"></script>
<script th:src="@{/js/main.js}"></script>

<!-- Auto highlight active nav item -->
<script>
    (function () {
        var path = window.location.pathname;
        var map = {
            'nav-dashboard':    ['/admin'],
            'nav-room-types':   ['/admin/room-types'],
            'nav-rooms':        ['/admin/rooms'],
            'nav-amenities':    ['/admin/amenities'],
            'nav-promotions':   ['/admin/promotions'],
            'nav-restaurants':         ['/admin/restaurants'],
            'nav-feedbacks':    ['/admin/feedbacks'],
            'nav-blogs':        ['/admin/blogs'],
            'nav-users':        ['/admin/users'],
            'nav-receptionists':['/admin/receptionists']
        };
        Object.entries(map).forEach(function ([id, paths]) {
            var el = document.getElementById(id);
            if (!el) return;
            var matched = paths.some(function (p) {
                return p === '/admin' ? path === '/admin' : path.startsWith(p);
            });
            if (matched) el.classList.add('active');
        });
    })();
</script>
</body>
</html>
