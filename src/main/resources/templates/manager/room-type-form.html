<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/manager-layout}">
<head>
    <title th:text="${roomType.roomTypeId == null ? 'Thêm Loại Phòng' : 'Sửa Loại Phòng'}"></title>
</head>
<body>
<div layout:fragment="content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 th:text="${roomType.roomTypeId == null ? 'Thêm Loại Phòng Mới' : 'Sửa Loại Phòng'}"></h3>
                </div>
                <div class="card-body">
                    <form th:action="@{${roomType.roomTypeId == null ? '/manager/room-types/create' : '/manager/room-types/update/' + roomType.roomTypeId}}"
                          th:object="${roomType}"
                          method="post">

                        <div class="mb-3">
                            <label for="roomTypeName" class="form-label">Tên Loại Phòng *</label>
                            <input type="text"
                                   class="form-control"
                                   id="roomTypeName"
                                   th:field="*{roomTypeName}"
                                   required>
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('roomTypeName')}" th:errors="*{roomTypeName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label">Giá (VNĐ) *</label>
                            <input type="number"
                                   class="form-control"
                                   id="price"
                                   th:field="*{price}"
                                   step="0.01"
                                   required>
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="amountPerson" class="form-label">Số Người *</label>
                            <select class="form-select"
                                    id="amountPerson"
                                    th:field="*{amountPerson}"
                                    required>
                                <option value="">-- Chọn số người --</option>
                                <option value="1">1 người</option>
                                <option value="2">2 người</option>
                                <option value="3">3 người</option>
                                <option value="4">4 người</option>
                            </select>
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('amountPerson')}" th:errors="*{amountPerson}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Mô Tả</label>
                            <textarea class="form-control"
                                      id="description"
                                      th:field="*{description}"
                                      rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="device" class="form-label">Thiết Bị</label>
                            <textarea class="form-control"
                                      id="device"
                                      th:field="*{device}"
                                      rows="2"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="utilities" class="form-label">Tiện Ích</label>
                            <textarea class="form-control"
                                      id="utilities"
                                      th:field="*{utilities}"
                                      rows="2"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Lưu
                            </button>
                            <a th:href="@{/manager/room-types}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Hủy
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
