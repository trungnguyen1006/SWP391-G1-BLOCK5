<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/manager-layout}">
<head>
    <title>Dashboard</title>
    <th:block layout:fragment="extra-css">
        <style>
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px;
                margin-top: 8px;
            }

            .stat-card {
                background: #fff;
                border-radius: 12px;
                padding: 20px 18px;
                display: flex;
                align-items: center;
                gap: 16px;
                box-shadow: 0 2px 6px rgba(0,0,0,0.07);
                border: 1px solid #e8e8e8;
                transition: transform 0.15s ease, box-shadow 0.15s ease;
            }

            .stat-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            }

            .stat-icon {
                width: 50px;
                height: 50px;
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                flex-shrink: 0;
            }

            .stat-label {
                font-size: 11px;
                color: #888;
                font-weight: 500;
                text-transform: uppercase;
                letter-spacing: 0.4px;
                margin-bottom: 4px;
            }

            .stat-value {
                font-size: 24px;
                font-weight: 700;
                color: #222;
                line-height: 1;
            }

            .stat-value.revenue { font-size: 16px; }

            /* Color themes */
            .blue   .stat-icon { background: #dbeafe; color: #2563eb; }
            .green  .stat-icon { background: #dcfce7; color: #16a34a; }
            .orange .stat-icon { background: #ffedd5; color: #ea580c; }
            .purple .stat-icon { background: #f3e8ff; color: #9333ea; }
            .teal   .stat-icon { background: #ccfbf1; color: #0d9488; }
            .indigo .stat-icon { background: #e0e7ff; color: #4f46e5; }
            .red    .stat-icon { background: #fee2e2; color: #dc2626; }
            .pink   .stat-icon { background: #fce7f3; color: #db2777; }
            .yellow .stat-icon { background: #fef9c3; color: #ca8a04; }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-1">Tổng Quan Hệ Thống</h2>
    <p class="text-muted mb-4" style="font-size:13px;">Thống kê realtime từ cơ sở dữ liệu</p>

    <div class="stats-grid">

        <!-- 1. Tổng số phòng -->
        <div class="stat-card blue">
            <div class="stat-icon"><i class="fas fa-door-open"></i></div>
            <div>
                <div class="stat-label">Tổng số phòng</div>
                <div class="stat-value" th:text="${totalRooms}">0</div>
            </div>
        </div>

        <!-- 2. Phòng trống -->
        <div class="stat-card green">
            <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
            <div>
                <div class="stat-label">Phòng trống</div>
                <div class="stat-value" th:text="${availableRooms}">0</div>
            </div>
        </div>

        <!-- 3. Đặt phòng tháng này -->
        <div class="stat-card orange">
            <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
            <div>
                <div class="stat-label">Đặt phòng tháng này</div>
                <div class="stat-value" th:text="${monthlyBookings}">0</div>
            </div>
        </div>

        <!-- 4. Doanh thu tháng này -->
        <div class="stat-card purple">
            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            <div>
                <div class="stat-label">Doanh thu tháng này</div>
                <div class="stat-value revenue"
                     th:text="${#numbers.formatDecimal(monthlyRevenue, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>
            </div>
        </div>

        <!-- 5. Loại phòng -->
        <div class="stat-card teal">
            <div class="stat-icon"><i class="fas fa-th-list"></i></div>
            <div>
                <div class="stat-label">Loại phòng</div>
                <div class="stat-value" th:text="${totalRoomTypes}">0</div>
            </div>
        </div>

        <!-- 6. Blog -->
        <div class="stat-card indigo">
            <div class="stat-icon"><i class="fas fa-blog"></i></div>
            <div>
                <div class="stat-label">Bài viết Blog</div>
                <div class="stat-value" th:text="${totalBlogs}">0</div>
            </div>
        </div>

        <!-- 7. Feedback -->
        <div class="stat-card red">
            <div class="stat-icon"><i class="fas fa-comment-dots"></i></div>
            <div>
                <div class="stat-label">Góp ý khách hàng</div>
                <div class="stat-value" th:text="${totalFeedbacks}">0</div>
            </div>
        </div>

        <!-- 8. Nhà hàng -->
        <div class="stat-card pink">
            <div class="stat-icon"><i class="fas fa-utensils"></i></div>
            <div>
                <div class="stat-label">Nhà hàng</div>
                <div class="stat-value" th:text="${totalRestaurants}">0</div>
            </div>
        </div>

        <!-- 9. Promotion đang hoạt động -->
        <div class="stat-card yellow">
            <div class="stat-icon"><i class="fas fa-tags"></i></div>
            <div>
                <div class="stat-label">Mã giảm giá đang chạy</div>
                <div class="stat-value" th:text="${activePromotions}">0</div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
